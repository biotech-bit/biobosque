<div id="cadastro" class="conteudo-aba">
    <div class="layout-grid-responsivo">
        <div class="coluna-flex">
            <div class="secao-card">
                <h2>📸 Scanner Botânico de Campo</h2>
                <p>Capture o espécime e o sistema georreferenciará automaticamente a planta no mapa.</p>
                <button class="btn-acao btn-gps-camera" onclick="iniciarCapturaInteligente()">IDENTIFICAR E REGISTRAR PLANTA</button>
                <input type="file" id="input-camera" accept="image/*" capture="environment" style="display:none;" onchange="processarFoto(event)">
                <img id="preview-foto" class="preview-foto-capturada" alt="Preview da Foto">
            </div>
            <div id="map-cadastro"></div>
        </div>

        <div class="secao-card">
            <h2>📋 Ficha de Catalogação</h2>
            <div class="formulario-grupo"><label>Localização (GPS):</label><input type="text" id="reg-coords" readonly></div>
            <div class="formulario-grupo"><label>Nome Científico:</label><input type="text" id="reg-cientifico" placeholder="Ex: Bertholletia excelsa"></div>
            <div class="formulario-grupo"><label>Status de Saúde:</label>
                <select id="reg-status">
                    <option value="Sadi">Sadi</option>
                    <option value="Fitopatologia Detectada">Fitopatologia Detectada</option>
                    <option value="Em Monitoramento">Em Monitoramento</option>
                </select>
            </div>
            <div class="formulario-grupo"><label>Observações do Coletor:</label><textarea id="reg-caract" rows="3"></textarea></div>
            <button class="btn-acao" onclick="salvarNoBanco()">ADICIONAR AO ACERVO</button>
        </div>
    </div>
</div>

<script>
    function iniciarCapturaInteligente() {
        // 1. Abre a câmera
        document.getElementById('input-camera').click();
        
        // 2. Captura o GPS imediatamente
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude.toFixed(6);
                const lng = pos.coords.longitude.toFixed(6);
                document.getElementById('reg-coords').value = `${lat}, ${lng}`;
                
                // Centraliza o mapa na posição atual
                mapaCadastro.setView([lat, lng], 19);
                if(marcadorCadastro) marcadorCadastro.setLatLng([lat, lng]);
            }, null, { enableHighAccuracy: true });
        }
    }

    function salvarNoBanco() {
        // Aqui você cria o objeto que será salvo no banco de dados (seu JSON ou Firebase)
        const novaPlanta = {
            id: Date.now(), // ID único baseado no tempo
            coords: document.getElementById('reg-coords').value,
            cientifico: document.getElementById('reg-cientifico').value,
            status: document.getElementById('reg-status').value,
            data: new Date().toLocaleDateString()
        };

        // Lógica de salvamento (ex: localStorage ou enviar para servidor)
        console.log("Planta catalogada com sucesso:", novaPlanta);
        alert("Dados registrados no Banco de Dados com sucesso!");
    }
</script>
