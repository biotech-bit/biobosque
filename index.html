<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioCatalog v6.0 - Sistema de Inventário</title>
    <style>
        /* Estilos da versão 6 preservados */
        body { font-family: sans-serif; background: #f1f3f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .aba { display: none; }
        .ativa { display: block; }
        .secao-card { background: white; border-radius: 8px; padding: 20px; border: 1px solid #dee2e6; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="abas-menu">
        <button onclick="mudarAba('inicio')">Início</button>
        <button onclick="mudarAba('cadastro')">Cadastro</button>
        <button onclick="mudarAba('catalogo')">Catálogo</button>
    </div>

    <div id="inicio" class="aba ativa">
        <div class="secao-card">
            <h2>Bem-vindo ao BioCatalog v6.0</h2>
            <p>Sistema de Inventário Florestal - IFPA Itaituba</p>
        </div>
    </div>

    <div id="cadastro" class="aba">
        <div class="secao-card">
            <h2>Captura em Campo</h2>
            <input type="file" id="input-camera" accept="image/*" capture="environment">
            <button onclick="salvarDados()">Salvar Registro</button>
        </div>
    </div>

    <div id="catalogo" class="aba">
        <div class="secao-card">
            <h2>Matriz de Dados</h2>
            <div id="corpo-tabela"></div>
        </div>
    </div>
</div>

<script>
    function mudarAba(abaId) {
        document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
        document.getElementById(abaId).classList.add('ativa');
    }

    function salvarDados() {
        // Lógica da v6
        alert("Registro salvo no sistema!");
    }
</script>
</body>
</html>
