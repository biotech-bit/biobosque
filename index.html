<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário Botânico IFPA</title>
    <style>
        /* CSS Integrado */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f0fdf4; color: #1e293b; }
        nav { background-color: #064e3b; padding: 1rem; color: white; display: flex; justify-content: center; gap: 15px; }
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; }
        .tab-btn { background: #059669; color: white; }
        section { padding: 20px; max-width: 800px; margin: auto; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 5px; }
        .card { border-left: 5px solid #059669; padding: 15px; margin-bottom: 15px; background: #f8fafc; }
    </style>
</head>
<body>

    <nav>
        <button class="tab-btn" onclick="show('inicio')">Início</button>
        <button class="tab-btn" onclick="show('cadastro')">Cadastro</button>
        <button class="tab-btn" onclick="show('catalogo')">Catálogo</button>
        <button class="tab-btn" onclick="show('autores')">Autores</button>
    </nav>

    <main>
        <section id="inicio">
            <h1>Projeto Flora IFPA Itaituba</h1>
            <p>Sistema de Mapeamento Ambiental com QR Code.</p>
        </section>

        <section id="cadastro" style="display:none;">
            <h2>Cadastrar Planta</h2>
            <form id="formPlanta">
                <select id="especie" required>
                    <option value="Samaúma">Samaúma</option>
                    <option value="Castanheira">Castanheira</option>
                    <option value="Ipê">Ipê-Amarelo</option>
                </select>
                <input type="file" id="foto" accept="image/*" capture="environment">
                <button type="button" onclick="pegarGPS()" style="background:#3b82f6;">Pegar Localização GPS</button>
                <button type="submit" style="background:#059669;">Salvar Planta</button>
            </form>
        </section>

        <section id="catalogo" style="display:none;">
            <h2>Catálogo de Espécies</h2>
            <div id="lista"></div>
        </section>

        <section id="autores" style="display:none;">
            <h2>Autores</h2>
            <p>Rose Magno, Eduardo Davi e João Gustavo.</p>
        </section>
    </main>

    <script>
        // JavaScript Integrado
        let plantas = [];
        let lat, lng;

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function pegarGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                lat = p.coords.latitude;
                lng = p.coords.longitude;
                alert("GPS capturado!");
            });
        }

        document.getElementById('formPlanta').onsubmit = (e) => {
            e.preventDefault();
            const novaPlanta = {
                especie: document.getElementById('especie').value,
                lat: lat, lng: lng
            };
            plantas.push(novaPlanta);
            alert("Planta cadastrada!");
            renderizar();
        };

        function renderizar() {
            document.getElementById('lista').innerHTML = plantas.map(p => `
                <div class="card">
                    <h3>${p.especie}</h3>
                    <p>Lat: ${p.lat} | Lng: ${p.lng}</p>
                    <a href="https://www.google.com/maps?q=${p.lat},${p.lng}&t=k" target="_blank">Ver no Mapa Satélite</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
